services:
  - type: web
    name: django-semihack
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput

    startCommand: gunicorn event_cert.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"