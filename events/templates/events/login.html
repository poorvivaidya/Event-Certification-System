{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2>Student Login</h2>

    <form method="post">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username">

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password">

        <button
            type="submit"
            class="btn btn-primary">

            Login

        </button>

    </form>

</div>

{% endblock %}
